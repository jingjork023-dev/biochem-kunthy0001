            { c: "Advanced Clinical Cases & Biomarkers", q: "94. High accumulation of unesterified cholesterol in plasma and body tissues, clinically lead to:", t: 1, a: [3], o: ["Renal insufficiency", "Premature atherosclerosis", "Hemolytic anemia", "All of these"] },
            { c: "Advanced Clinical Cases & Biomarkers", q: "95. A 15-year-old woman presented to the surgical unit with acute pancreatitis with Cholesterol 33.4 mmol/L, Triglyceride 69.1 mmol/L, HDL 0.9 mmol/L and Amylase < 20 U/L:", t: 1, a: [1], o: ["Familial Combined Hyperlipidemia (Type IIa, IIb and IV)", "Hypertriglyceridemia", "Familial hypercholesterolemia", "Hypercholesterolemia"] },
            { c: "Advanced Clinical Cases & Biomarkers", q: "96. Post-Renal Azotemia may cause:", t: 1, a: [3], o: ["Renal calculi", "Tumors of bladder or prostate", "Severe infections", "All of these"] },
            { c: "Advanced Clinical Cases & Biomarkers", q: "97. Uric acid is measured to:", t: 1, a: [3], o: ["Assess inherited disorders of purine metabolism", "Confirm diagnosis and monitor treatment of gout", "Assist in the diagnosis of renal calculi", "All of these"] },
            { c: "Advanced Clinical Cases & Biomarkers", q: "98. What is the metabolic consequence of a deficiency in Apo B-100?", t: 1, a: [2], o: ["Increased HDL production", "Reduced chylomicron formation", "Inability to produce VLDL / LDL", "Reduced bile production"] },
            { c: "Advanced Clinical Cases & Biomarkers", q: "99. Which LFT marker is most sensitive for detecting cholestasis (bile duct obstruction)?", t: 1, a: [2], o: ["ALT", "Albumin", "Alkaline phosphatase (ALP)", "Bilirubin"] },
            { c: "Advanced Clinical Cases & Biomarkers", q: "100. Cause of bisalbuminaemias:", t: 1, a: [3], o: ["Inherited mutation of a gene Albumin", "β lactam: high-dose therapy in renal failure", "Pancreatic fistula, by lysis Albumin by pancreatic enzymes", "All of these"] }
        ];

        // Audio Context for feedback
        let audioCtx = null;
        function playTone(freq, type, duration) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }
        const playCorrect = () => playTone(880, 'sine', 0.2);
        const playWrong = () => playTone(220, 'square', 0.2);

        let totalQuestions = 0;

        function initMCQs() {
            const container = document.getElementById('quiz-container');
            let currentChapter = "";

            mcqs.forEach((m, idx) => {
                // Insert Chapter Header
                if (m.c !== currentChapter) {
                    currentChapter = m.c;
                    const chapterHeader = document.createElement('div');
                    chapterHeader.className = "chapter-header text-white px-6 py-4 rounded-xl shadow-md mt-10 mb-6";
                    chapterHeader.innerHTML = `<h2 class="text-2xl font-bold">${currentChapter}</h2>`;
                    container.appendChild(chapterHeader);
                }

                totalQuestions++;
                
                const qDiv = document.createElement('div');
                qDiv.className = 'mcq-wrapper p-5 md:p-6 border border-gray-200 rounded-xl bg-white shadow-sm transition-all duration-300';
                qDiv.id = `wrapper-q${idx}`;
                
                qDiv.innerHTML = `
                    <p class="font-bold text-lg text-gray-800 mb-4 leading-relaxed">${m.q}</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 options-grid" id="grid-q${idx}">
                        ${m.o.map((opt, oIdx) => `
                            <label class="flex items-start p-3 md:p-4 border border-gray-200 rounded-xl hover:bg-slate-50 cursor-pointer transition relative group overflow-hidden bg-white">
                                <input type="radio" name="q${idx}" value="${oIdx}" class="mt-1 mr-3 w-5 h-5 text-blue-600 hidden" onchange="checkAnswer(${idx})">
                                <div class="w-5 h-5 mt-0.5 mr-3 border-2 border-gray-300 rounded-full check-indicator flex-shrink-0"></div>
                                <span class="text-gray-700 leading-snug">${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                `;
                container.appendChild(qDiv);
            });
            
            document.getElementById('total-qs').textContent = totalQuestions;
        }

        // Logic to check answer instantly when selected
        function checkAnswer(qIdx) {
            const m = mcqs[qIdx];
            const grid = document.getElementById(`grid-q${qIdx}`);
            const wrapper = document.getElementById(`wrapper-q${qIdx}`);
            const labels = grid.querySelectorAll('label');
            const checkedBoxes = grid.querySelectorAll(`input[name="q${qIdx}"]:checked`);
            
            if (checkedBoxes.length === 1) {
                grid.classList.add('disabled-labels');
                let isPerfect = true;
                
                // Evaluate selected boxes
                checkedBoxes.forEach(cb => {
                    const val = parseInt(cb.value);
                    if (m.a.includes(val)) {
                        labels[val].classList.add('option-correct');
                    } else {
                        labels[val].classList.add('option-incorrect');
                        isPerfect = false;
                    }
                });
                
                // Reveal the correct answers that were missed
                m.a.forEach(correctVal => {
                    labels[correctVal].classList.add('option-correct');
                });

                if (isPerfect) {
                    playCorrect();
                    wrapper.classList.add('border-green-300', 'bg-green-50/30');
                } else {
                    playWrong();
                    wrapper.classList.add('border-red-300', 'bg-red-50/30');
                }
            }
        }

        function gradeQuiz() {
            let totalScore = 0;
            
            mcqs.forEach((m, idx) => {
                const checkedBoxes = document.querySelectorAll(`input[name="q${idx}"]:checked`);
                let isPerfect = false;

                if (checkedBoxes.length === 1) {
                    isPerfect = true;
                    checkedBoxes.forEach(cb => {
                        if (!m.a.includes(parseInt(cb.value))) {
                            isPerfect = false;
                        }
                    });
                }
                
                if (isPerfect) totalScore++;
                
                // Auto-evaluate any unanswered questions
                if (checkedBoxes.length < 1) {
                     // Provide visual feedback for unanswered questions
                     const grid = document.getElementById(`grid-q${idx}`);
                     grid.classList.add('disabled-labels');
                     const labels = grid.querySelectorAll('label');
                     m.a.forEach(correctVal => {
                         labels[correctVal].classList.add('option-correct');
                     });
                     document.getElementById(`wrapper-q${idx}`).classList.add('border-red-300', 'bg-red-50/30');
                }
            });

            document.getElementById('score').textContent = totalScore;
            document.getElementById('result').style.display = 'block';
            document.getElementById('submit-btn-container').style.display = 'none';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        window.onload = initMCQs;
    </script>
